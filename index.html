<style>
:root {
  --forest: #1a3a2a; --leaf: #3d7a56; --gold: #c9a44a; --sand: #f5efe6; --white: #fdfaf6; --ink: #1c2a22;
  --serif: 'Fraunces', Georgia, serif; --body: 'DM Sans', sans-serif;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--white); color: var(--ink); font-family: var(--body); line-height: 1.6; }
nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(26,58,42,0.95); backdrop-filter: blur(10px); color: white; }
.nav-logo { font-family: var(--serif); font-size: 20px; }
.nav-logo span { color: var(--gold); }
#hero { height: 60svh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('portada.jpg') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
.section { padding: 60px 20px; max-width: 1100px; margin: 0 auto; text-align: center; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
.card-img { height: 250px; border-radius: 15px; background-size: cover; background-position: center; }
.wa-btn { display: inline-flex; align-items: center; gap: 10px; background: #25D366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; margin: 10px; }
.wa-secondary { background: #555; }
.floating-wa { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
</style>
</head>
<body>

</section>

<div class="grid">

<span>Reserva Principal (327 108 0200)</span>
</a>
<a class="wa-btn wa-secondary" href="https://wa.me/523331771903?text=Hola%2C%20vengo%20de%20la%20pagina%20web">
<span>WhatsApp Secundario</span>
</a>
</div>
</section>

<a href="https://wa.me/523271080200" class="floating-wa" target="_blank">
<span role="img" aria-label="WhatsApp">💬</span>
